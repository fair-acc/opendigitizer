name: CMake

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

env:
  REFERENCE_CONFIG: 'Ubuntu Latest - gcc 12' # configuration used for coverage etc

jobs:
  build:
    name: "${{ matrix.configurations.name }} | ${{ matrix.cmake-build-type }}"
    runs-on: ${{ matrix.configurations.os }}
    strategy:
      fail-fast: false
      matrix:
        configurations:
          - name: "Ubuntu Latest - gcc 12"
            os: ubuntu-22.04
            compiler: gcc12
        # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
        cmake-build-type: [ Release ] #, Debug ]

    steps:
    - uses: actions/checkout@v3

    - name: Cache
      uses: actions/cache@v3
      env:
        cache-name: cache-fetchContent-cache
      with:
        path: ${{runner.workspace}}/build/_deps
        key: ${{ runner.os }}-${{ matrix.configurations.compiler }}-${{ matrix.cmake-build-type }}-${{ hashFiles('CMakeLists.txt') }}-${{ hashFiles('cmake/Dependencies.cmake') }}

    - name: Setup emsdk
      uses: mymindstorm/setup-emsdk@v11
      with:
        version: 1.38.40
        actions-cache-folder: 'emsdk-cache'

    - name: Install gcc-12
      if: matrix.configurations.compiler == 'gcc12'
      run: |
        sudo apt-get install -y gcc-12 g++-12
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-12 110 --slave /usr/bin/g++ g++ /usr/bin/g++-12 --slave /usr/bin/gcov gcov /usr/bin/gcov-12

    - name: Install openGL
      run: |
        sudo apt-get install -y libx11-dev libgl1-mesa-dev

    - name: Configure CMake
      shell: bash
      run: cmake -S . -B ../build -DCMAKE_BUILD_TYPE=${{ matrix.cmake-build-type }} -DEMCMAKE_COMMAND=`which emcmake`

    - name: Build
      shell: bash
      run: cmake --build ../build

    - name: Run tests
      working-directory: ${{runner.workspace}}/build
      shell: bash
      run: cmake --build . --target test

